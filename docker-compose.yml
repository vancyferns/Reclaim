version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: reclaim-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: reclaim
      POSTGRES_USER: reclaim_user
      POSTGRES_PASSWORD: reclaim_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reclaim_user -d reclaim"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: reclaim-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: reclaim
      DB_USER: reclaim_user
      DB_PASSWORD: reclaim_dev_password
      JWT_SECRET: change-this-to-a-secure-secret
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"

  # Frontend (development)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: reclaim-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  pgdata:
